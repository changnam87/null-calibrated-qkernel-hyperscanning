dataset:
  name: primary_triads
  type: triadic_eeg_hyperscanning
  description: Primary triadic Prisoner's Dilemma EEG hyperscanning dataset
  group_column: group_id
  split_group_column: group_id

synchrony:
  metrics:
    - plv
    - coherence
  combine_metrics: true
  combined_score: abs_delta_plv_plus_abs_delta_coherence

features:
  main_k_values: [4, 6, 8]
  exploratory_k_values: [10, 12]
  feature_sets:
    - raw_topk
    - null_sensitive
    - evidence_aware

null_models:
  main:
    - label_permutation
    - time_shift
    - partner_shuffle
  exploratory:
    - pooled_null

cross_validation:
  method: group_kfold
  n_splits: 5
  repeats: 1
  random_seed: 20260710

outputs:
  feature_dir: data/features
  split_dir: data/splits
  result_dir: results/primary
